services:
  nginx:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    container_name: atma_nginx
    restart: unless-stopped
    depends_on:
      - api_gateway
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ${NGINX_CONF_FILE:-./nginx/atma-api.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${NGINX_CERT_DIR:-./nginx/certs}:/etc/nginx/certs:ro
    networks:
      - atma_internal
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://127.0.0.1:8080/healthz | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  eureka_server:
    build:
      context: ../eureka_server
    container_name: atma_eureka_server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${EUREKA_SERVER_PORT}
    expose:
      - "${EUREKA_SERVER_PORT}"
    networks:
      atma_internal:
        aliases:
          - eureka-server
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${EUREKA_SERVER_PORT}/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api_gateway:
    build:
      context: ../api_gateway
    container_name: atma_api_gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${API_GATEWAY_PORT}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_SERVER_URL}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE}
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    expose:
      - "${API_GATEWAY_PORT}"
    depends_on:
      - eureka_server
    networks:
      atma_internal:
        aliases:
          - api-gateway
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${API_GATEWAY_PORT}/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  auth_service:
    build:
      context: ../auth_service
    container_name: atma_auth_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${AUTH_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS}
      MAIL_SMTP_STARTTLS_REQUIRED: ${MAIL_SMTP_STARTTLS_REQUIRED}
      PASSWORD_RESET_CODE_TTL_MINUTES: ${PASSWORD_RESET_CODE_TTL_MINUTES}
      PASSWORD_RESET_MAX_ATTEMPTS: ${PASSWORD_RESET_MAX_ATTEMPTS}
      PASSWORD_RESET_REQUEST_COOLDOWN_SECONDS: ${PASSWORD_RESET_REQUEST_COOLDOWN_SECONDS}
      PASSWORD_RESET_SESSION_TTL_MINUTES: ${PASSWORD_RESET_SESSION_TTL_MINUTES}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_SERVER_URL}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE}
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS}
    expose:
      - "${AUTH_SERVICE_PORT}"
    depends_on:
      - eureka_server
    networks:
      atma_internal:
        aliases:
          - auth-service
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${AUTH_SERVICE_PORT}/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 75s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sensor_service:
    build:
      context: ../sensor_service
    container_name: atma_sensor_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SENSOR_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_SERVER_URL}
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USE_TLS: ${MQTT_USE_TLS}
      MQTT_TLS_CA_FILE: /mosquitto/certs/ca.crt
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID}
      MQTT_COMMAND_CLIENT_ID: ${MQTT_COMMAND_CLIENT_ID}
      MQTT_SENSOR_TOPIC: ${MQTT_SENSOR_TOPIC}
      MQTT_COMMAND_TOPIC_PREFIX: ${MQTT_COMMAND_TOPIC_PREFIX}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      DEVICE_ID: ${DEVICE_ID}
      DEVICE_OFFLINE_THRESHOLD_SECONDS: ${DEVICE_OFFLINE_THRESHOLD_SECONDS}
      NOTIFICATION_TEMPERATURE_IDEAL_MIN: ${NOTIFICATION_TEMPERATURE_IDEAL_MIN}
      NOTIFICATION_TEMPERATURE_IDEAL_MAX: ${NOTIFICATION_TEMPERATURE_IDEAL_MAX}
      NOTIFICATION_HUMIDITY_THRESHOLD: ${NOTIFICATION_HUMIDITY_THRESHOLD}
      NOTIFICATION_EVENT_COOLDOWN_SECONDS: ${NOTIFICATION_EVENT_COOLDOWN_SECONDS}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE}
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS}
    expose:
      - "${SENSOR_SERVICE_PORT}"
    depends_on:
      - eureka_server
      - mosquitto
    networks:
      atma_internal:
        aliases:
          - sensor-service
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${SENSOR_SERVICE_PORT}/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 75s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: atma_mosquitto
    restart: unless-stopped
    user: "1883:1883"
    env_file:
      - .env
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - ./mosquitto/passwordfile:/mosquitto/config/passwordfile:ro
      - ${MQTT_CERT_DIR:-./mosquitto/certs}:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "${MQTT_PUBLIC_PORT:-8883}:8883"
    networks:
      - atma_internal
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -p 8883 --cafile /mosquitto/certs/ca.crt -u \"$${MQTT_USERNAME}\" -P \"$${MQTT_PASSWORD}\" -t atma/device/atma-dryer-001/command/health -m ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: atma_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "${PROMETHEUS_PORT}"
    networks:
      - atma_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${PROMETHEUS_PORT}/-/healthy | grep -q 'Prometheus is Healthy'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.1.4
    container_name: atma_grafana
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    expose:
      - "${GRAFANA_PORT}"
    depends_on:
      - prometheus
    networks:
      - atma_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${GRAFANA_PORT}/api/health | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  atma_internal:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
  prometheus_data:
  grafana_data:
