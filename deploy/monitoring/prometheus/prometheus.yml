global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api_gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8085']

  - job_name: 'eureka_server'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['eureka-server:8761']

  - job_name: 'auth_service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'sensor_service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['sensor-service:8082']
