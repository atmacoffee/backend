spring:
  config:
    activate:
      on-profile: local

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka}

jwt:
  secret: ${JWT_SECRET:local-development-jwt-secret-atma-auth-gateway-2026}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://127.0.0.1:8085}

management:
  endpoint:
    health:
      show-details: always
