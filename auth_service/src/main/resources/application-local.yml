spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:atma_local}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:atma_app}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:atma_local_password}}
  flyway:
    table: ${SPRING_FLYWAY_TABLE:auth_flyway_schema_history}
    baseline-on-migrate: false
  mail:
    host: ${MAIL_HOST:mailpit}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:false}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:local-development-jwt-secret-atma-auth-gateway-2026}

app:
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN:local-internal-service-token}
  mail:
    from: ${MAIL_FROM:noreply@atma.local}
    from-name: ${MAIL_FROM_NAME:ATMA Dryer Local}

management:
  endpoint:
    health:
      show-details: always
