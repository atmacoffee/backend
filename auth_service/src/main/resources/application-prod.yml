spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

app:
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN}
  mail:
    from: ${MAIL_FROM}
    from-name: ${MAIL_FROM_NAME}
