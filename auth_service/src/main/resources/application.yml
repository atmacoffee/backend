spring:
  application:
    name: auth-service
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8081}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when_authorized}
  metrics:
    tags:
      application: ${spring.application.name}

app:
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN}
  mail:
    from: ${MAIL_FROM}
    from-name: ${MAIL_FROM_NAME:ATMA Dryer}
  password-reset:
    code-ttl-minutes: ${PASSWORD_RESET_CODE_TTL_MINUTES:10}
    max-attempts: ${PASSWORD_RESET_MAX_ATTEMPTS:5}
    request-cooldown-seconds: ${PASSWORD_RESET_REQUEST_COOLDOWN_SECONDS:60}
    session-ttl-minutes: ${PASSWORD_RESET_SESSION_TTL_MINUTES:10}
